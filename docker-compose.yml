version: "3.9"

# ─────────────────────────────────────────────────────────────
#  BharatBI — Local Development Docker Compose
#  Usage: docker-compose up
#  All services start together. Hot-reload enabled for api & web.
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL (local dev only — use Supabase in production) ──
  postgres:
    image: postgres:16-alpine
    container_name: bharatbi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bharatbi
      POSTGRES_PASSWORD: bharatbi_dev
      POSTGRES_DB: bharatbi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bharatbi"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Qdrant (vector database) ──────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bharatbi-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery message broker) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bharatbi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: bharatbi-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bharatbi:bharatbi_dev@postgres:5432/bharatbi
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./packages:/packages
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (background jobs: schema ingestion, embedding) ─
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: bharatbi-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bharatbi:bharatbi_dev@postgres:5432/bharatbi
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./apps/api:/app
      - ./packages:/packages
    depends_on:
      - redis
      - postgres
      - qdrant
    command: celery -A tasks.celery_app worker --loglevel=info

  # ── Next.js Frontend ───────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: bharatbi-web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    command: npm run dev

volumes:
  postgres_data:
  qdrant_data:
  redis_data: